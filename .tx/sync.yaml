filters:
  - filter_type: dynamic
    file_format: MARKDOWN_JSX
    source_language: en
    source_files_expression: main/docs/<dir>/<file>.mdx
    # Temporarily pointing translation directories to a non-existing place
    # to prevent Transifex from importing existing translated documents
    # remove the "/not_found" segment once ready
    translation_files_expression: main/docs/not_found/<lang>/<dir>/<file>.mdx
    ignore_dirs:
      - main/docs/fr-ca
      - main/docs/ja-jp
      - main/docs/libraries/acul
      - main/docs/api
      - main/docs/events
# this additional block to catch files directly under main/docs/
  - filter_type: dynamic
    file_format: MARKDOWN_JSX
    source_language: en
    source_files_expression: main/docs/<file>.mdx
    # Temporarily pointing translation directories to a non-existing place
    # to prevent Transifex from importing existing translated documents
    # remove the "/not_found" segment once ready
    translation_files_expression: main/docs/not_found/<lang>/<file>.mdx

settings:
  pr_branch_name: tx_translations_<br_unique_id>
  language_mapping:
    fr_CA: fr-ca
    ja_JP: ja-jp
