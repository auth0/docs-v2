name: Sync agent skills

on:
  repository_dispatch:
    types: [sync-agent-skills]
  schedule:
    - cron: '23 9 * * 1' # Weekly Monday 9:23 UTC
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout docs-v2
        uses: actions/checkout@v4

      - name: Fetch latest skills from agent-skills
        run: |
          SKILLS_DIR="main/.mintlify/skills"
          REPO_URL="https://github.com/auth0/agent-skills.git"
          TEMP_DIR=$(mktemp -d)

          git clone --depth 1 "$REPO_URL" "$TEMP_DIR"

          rm -rf "$SKILLS_DIR"
          mkdir -p "$SKILLS_DIR"

          for skill_dir in "$TEMP_DIR"/plugins/*/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "$skill_dir/SKILL.md" ]; then
              cp -r "$skill_dir" "$SKILLS_DIR/$skill_name"
              rm -rf "$SKILLS_DIR/$skill_name/tests"
              echo "Synced: $skill_name"
            fi
          done

          rm -rf "$TEMP_DIR"
          echo "--- Skills synced ---"
          ls "$SKILLS_DIR"

      - name: Open or update PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          sign-commits: true
          title: "chore: sync Mintlify agent skills"
          commit-message: "chore: sync Mintlify agent skills"
          branch: automated/mintlify-agent-skills-update
          body: |
            Automated weekly sync of SKILL.md files from [auth0/agent-skills](https://github.com/auth0/agent-skills).
            These files are served via Mintlify's skills discovery endpoint at \`auth0.com/docs/.well-known/skills/\`.
