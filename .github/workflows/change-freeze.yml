name: Change Freeze Check

on:
  schedule:
    - cron: '2 0 * * *'
  pull_request_target:
    types: [opened, reopened, edited, synchronize, labeled]

jobs:
  check:
    if: ${{ github.event_name == 'pull_request_target' }}
    uses: atko-cic/change-freeze-github-action/.github/workflows/change_freeze_check.yml@24d28cf5b5eab0feaa7da21f481d2b824b1509e2
    secrets: inherit

  rerun:
    if: ${{ github.event_name == 'schedule' }}
    uses: atko-cic/change-freeze-github-action/.github/workflows/change_freeze_rerun.yml@24d28cf5b5eab0feaa7da21f481d2b824b1509e2
    secrets: inherit
