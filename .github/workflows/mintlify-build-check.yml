name: Mintlify build check

on:
  pull_request:
    branches: [main]
    paths: ['main/**']
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  mintlify-build-check:
    name: Mintlify build check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Mintlify and validate build
        run: npm i -g mint
          
      - name: Validate Mintlify build
        run: |
          cd main
          mint validate >> $GITHUB_STEP_SUMMARY
